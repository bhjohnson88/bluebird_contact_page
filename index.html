<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Bluebird Portraits</title>
  <link rel="icon" href="images/brand-mark.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&family=Spectral:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;0,800;1,200;1,300;1,400;1,500;1,600;1,700;1,800&display=swap" rel="stylesheet">
</head>
<body class="bluebird-theme">
  <header class="header">
    <div class="container">
      <a href="/" class="header__brand">
        <img src="images/logo.svg" alt="Bluebird Portraits" class="header__logo" width="180" height="48">
      </a>
    </div>
  </header>

  <section class="banner">
    <div class="banner__inner">
      <img src="images/hero-banner.svg" alt="" class="banner__image" width="1132" height="280">
    </div>
  </section>

  <main class="main">
    <div class="container">
      <section class="contact-section">
        <h2 class="contact-section__title">Payment Plan Issues</h2>
        <p class="contact-section__desc">For questions about your payment plan:</p>
        <a href="tel:+18556242723" class="contact-section__phone">(855) 624-2723</a>
      </section>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p class="footer__copyright">&copy; Bluebird Portraits</p>
    </div>
  </footer>
</body>
</html>
